<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug info - VulnFlask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="topbar">
        <a class="brand" href="{{ url_for('index') }}">VulnFlask</a>
        <div class="navlinks">
            <a href="{{ url_for('niveles') }}">Niveles</a>
            <a href="{{ url_for('admin') }}">Admin</a>
            <a href="{{ url_for('upload_file') }}">Upload</a>
        </div>
    </nav>

    <main class="shell narrow">
        <section class="panel">
            <p class="eyebrow">Information disclosure</p>
            <h1>Debug info expuesto</h1>
            <dl class="kv">
                {% for key, value in info.items() %}
                    <dt>{{ key }}</dt>
                    <dd>{{ value }}</dd>
                {% endfor %}
            </dl>
        </section>
    </main>
</body>
</html>
