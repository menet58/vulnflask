<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - VulnFlask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="topbar">
        <a class="brand" href="{{ url_for('index') }}">VulnFlask</a>
        <div class="navlinks">
            <a href="{{ url_for('niveles') }}">Niveles</a>
            <a href="{{ url_for('admin') }}">Admin</a>
            <a href="{{ url_for('logout') }}">Salir</a>
        </div>
    </nav>

    <main class="shell narrow">
        <section class="panel">
            <p class="eyebrow">Sesion activa</p>
            <h1>Bienvenido, {{ user }}</h1>
            <p>Este panel requiere sesion, pero el login que lo protege es vulnerable a SQLi.</p>
            <div class="actions">
                <a class="button" href="{{ url_for('upload_file') }}">Probar upload</a>
                <a class="button secondary" href="{{ url_for('scan') }}">Analizar con YARA</a>
            </div>
        </section>
    </main>
</body>
</html>
