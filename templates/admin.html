<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin expuesto - VulnFlask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="topbar">
        <a class="brand" href="{{ url_for('index') }}">VulnFlask</a>
        <div class="navlinks">
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('debug_info') }}">Debug</a>
        </div>
    </nav>

    <main class="shell">
        <section class="panel">
            <p class="eyebrow">Broken access control</p>
            <h1>Panel admin sin autenticacion</h1>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Password</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                        <tr>
                            <td>{{ user.id }}</td>
                            <td>{{ user.username }}</td>
                            <td><code>{{ user.password }}</code></td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>

        <section class="panel">
            <h2>Secretos simulados</h2>
            <dl class="kv">
                {% for key, value in secrets.items() %}
                    <dt>{{ key }}</dt>
                    <dd>{{ value }}</dd>
                {% endfor %}
            </dl>
        </section>
    </main>
</body>
</html>
